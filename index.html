<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Диагностика учебной мотивации</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    background: linear-gradient(135deg, #1a3a5c 0%, #2c5f8a 100%);
    color: #fff;
    padding: 18px 24px;
    text-align: center;
  }
  header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: 0.3px; }
  header p  { font-size: 0.82rem; opacity: 0.8; margin-top: 4px; }

  #progress-bar-wrap {
    width: 100%;
    background: #d0dce8;
    height: 5px;
  }
  #progress-bar {
    height: 5px;
    background: #4caf8a;
    width: 0%;
    transition: width 0.4s ease;
  }

  #chat-wrap {
    width: 100%;
    max-width: 680px;
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0 12px 24px;
    margin-top: 16px;
  }

  #messages {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .bubble {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 0.95rem;
    line-height: 1.55;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

  .bubble.bot {
    background: #fff;
    color: #1a2a3a;
    border-bottom-left-radius: 4px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    align-self: flex-start;
  }
  .bubble.bot .label {
    font-size: 0.72rem;
    font-weight: 600;
    color: #2c5f8a;
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .bubble.user {
    background: #2c5f8a;
    color: #fff;
    border-bottom-right-radius: 4px;
    align-self: flex-end;
  }
  .bubble.system {
    background: #e8f4e8;
    color: #2d6a4f;
    border-radius: 12px;
    align-self: center;
    font-size: 0.88rem;
    text-align: center;
    max-width: 95%;
    padding: 10px 16px;
  }
  .bubble.profile {
    background: #fff;
    color: #1a2a3a;
    border-left: 4px solid #2c5f8a;
    border-radius: 12px;
    align-self: flex-start;
    max-width: 95%;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .bubble.profile .label {
    font-size: 0.72rem;
    font-weight: 600;
    color: #2c5f8a;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  #input-area {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    align-items: flex-end;
  }
  #user-input {
    flex: 1;
    border: 1.5px solid #c8d8e8;
    border-radius: 22px;
    padding: 11px 18px;
    font-size: 0.95rem;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 46px;
    max-height: 140px;
    overflow-y: auto;
    line-height: 1.45;
    transition: border-color 0.2s;
    background: #fff;
  }
  #user-input:focus { border-color: #2c5f8a; }

  #send-btn {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    border: none;
    background: #2c5f8a;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }
  #send-btn:hover  { background: #1a3a5c; }
  #send-btn:active { transform: scale(0.94); }
  #send-btn:disabled { background: #b0c4d8; cursor: default; }
  #send-btn svg { width: 20px; height: 20px; }

  #counter {
    text-align: center;
    font-size: 0.78rem;
    color: #8a9ab0;
    margin-top: 8px;
  }

  .typing {
    display: flex;
    gap: 5px;
    align-items: center;
    padding: 14px 16px;
  }
  .typing span {
    width: 8px; height: 8px;
    background: #aac;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40%          { transform: translateY(-7px); }
  }

  @media (max-width: 500px) {
    header h1 { font-size: 1rem; }
    .bubble    { font-size: 0.9rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Диагностика учебной мотивации</h1>
  <p>ГБОУ СОШ №471 · Индивидуальный подход в обучении</p>
</header>
<div id="progress-bar-wrap"><div id="progress-bar"></div></div>

<div id="chat-wrap">
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="user-input" placeholder="Напишите ответ..." rows="1"></textarea>
    <button id="send-btn" title="Отправить">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div id="counter"></div>
</div>

<script>
// ── Конфигурация ────────────────────────────────────────────────────────────

const OPENROUTER_KEY = "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";
const OPENROUTER_URL = "https://api.groq.com/openai/v1/chat/completions";
const SCRIPT_URL   = "https://script.google.com/macros/s/AKfycbwbaBPJQ5e-vLwkFO48XTioqMu9RGOxyFptRDEESOKXI3C8nGOIxQYDWrvt51RsT1Jp1Q/exec";

const SYSTEM_PROMPT =
  "Ты педагог-психолог. Определи мотивационный профиль учащегося по шести параметрам: " +
  "ведущий мотив (достижение/причастность/власть/безопасность), " +
  "тип мотивации (внутренняя/внешняя), " +
  "локус контроля (интернальный/экстернальный), " +
  "тип мотивов (непосредственные/опосредованные), " +
  "тип мотивационных факторов по Кнорцеру, " +
  "отношение к школе по Энтвислу. " +
  "Ответ дай в 5–7 предложениях на русском языке.";

const QUESTIONS = [
  "Что в школе для тебя самое приятное — или хотя бы не раздражающее? Расскажи про конкретный момент.",
  "Что ты чувствуешь в воскресенье вечером перед школой?",
  "Расскажи про случай, когда ты получил плохую оценку или что-то пошло не так в школе. Что ты сделал после?",
  "Как ты понимаешь, что хорошо выполнил задание? Приведи пример.",
  "Когда у тебя что-то получается в школе — за счёт чего это, как думаешь? А когда не получается — это от чего зависит?",
  "Когда учитель говорит «разбейтесь на группы для проекта» — что ты обычно думаешь в первую очередь? А что было бы идеально для тебя в такой ситуации?",
  "Бывало такое, что ты сам начинал что-то изучать или делать — не потому что задали, а потому что стало интересно? Расскажи. Что тебя тогда зацепило?",
  "Как ты сам себе объясняешь, зачем нужна школа? А ты бы ходил, если бы это не было обязательным? Почему?",
  "Если бы ты проводил опрос «Почему ты учишься?» — какой ответ был бы самым частым? А если анонимно — изменилось бы?",
  "Как ты хочешь, чтобы прошли каникулы?",
  "Ученик говорит: «Школа — скучно, но я хожу». Что его удерживает, как думаешь? А у тебя так бывает?",
  "Опиши идеального ученика с точки зрения школы. А теперь — самого обычного реального. В чём главная разница?",
  "Есть что-то, чему тебя учат в школе, что реально пригодится в жизни? Что именно и почему? А есть что-то, что точно не пригодится?",
  "Если бы ты мог добавить в расписание любой предмет — даже несуществующий — что бы это было? Почему?"
];

// ── Состояние ───────────────────────────────────────────────────────────────

let stage      = "class";   // "class" → "name" → "questions" → "done"
let studentClass = "";
let studentName  = "";
let qIndex     = 0;
const answers  = [];

// ── DOM ─────────────────────────────────────────────────────────────────────

const messagesEl = document.getElementById("messages");
const inputEl    = document.getElementById("user-input");
const sendBtn    = document.getElementById("send-btn");
const counterEl  = document.getElementById("counter");
const progressEl = document.getElementById("progress-bar");

// ── Утилиты ─────────────────────────────────────────────────────────────────

function scrollBottom() {
  setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" }), 80);
}

function addBubble(type, html) {
  const div = document.createElement("div");
  div.className = "bubble " + type;
  if (type === "bot") {
    div.innerHTML = '<div class="label">Бот</div>' + html;
  } else if (type === "profile") {
    div.innerHTML = '<div class="label">Мотивационный профиль</div>' + html;
  } else {
    div.textContent = html;
  }
  messagesEl.appendChild(div);
  scrollBottom();
  return div;
}

function addTyping() {
  const div = document.createElement("div");
  div.className = "bubble bot";
  div.id = "typing-bubble";
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  messagesEl.appendChild(div);
  scrollBottom();
}
function removeTyping() {
  const t = document.getElementById("typing-bubble");
  if (t) t.remove();
}

function updateProgress() {
  const total = QUESTIONS.length + 2; // +2: class + name
  const done  = (stage === "class") ? 0
              : (stage === "name")  ? 1
              : (stage === "done")  ? total
              : 2 + qIndex;
  progressEl.style.width = Math.round((done / total) * 100) + "%";
  if (stage === "questions") {
    counterEl.textContent = "Вопрос " + qIndex + " из " + QUESTIONS.length;
  } else {
    counterEl.textContent = "";
  }
}

function setInputEnabled(on) {
  inputEl.disabled  = !on;
  sendBtn.disabled  = !on;
  if (on) inputEl.focus();
}

// ── Авторазмер textarea ──────────────────────────────────────────────────────

inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
});
inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSend(); }
});
sendBtn.addEventListener("click", handleSend);

// ── Логика диалога ───────────────────────────────────────────────────────────

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function botSay(text, type = "bot") {
  addTyping();
  await delay(600 + Math.min(text.length * 12, 800));
  removeTyping();
  addBubble(type, text);
}

async function start() {
  setInputEnabled(false);
  await botSay("Привет! Я помогу разобраться, что тебе интереснее в учёбе и что тебя мотивирует. Это не тест и не оценка — здесь нет правильных и неправильных ответов. Просто отвечай честно, как думаешь. 🙂");
  await delay(300);
  await botSay("Давай начнём с пары коротких вопросов. В каком ты классе?");
  updateProgress();
  setInputEnabled(true);
}

async function handleSend() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = "";
  inputEl.style.height = "auto";
  setInputEnabled(false);
  addBubble("user", text);

  if (stage === "class") {
    studentClass = text;
    stage = "name";
    updateProgress();
    await botSay("Хорошо! Как тебя зовут? (Можешь написать имя или псевдоним — это по желанию.)");
    setInputEnabled(true);

  } else if (stage === "name") {
    studentName = text;
    stage = "questions";
    updateProgress();
    await botSay("Отлично, " + studentName + "! Теперь перейдём к основным вопросам. Отвечай развёрнуто — чем подробнее, тем лучше. Никуда не торопись.");
    await delay(400);
    await askQuestion();

  } else if (stage === "questions") {
    answers.push({ q: QUESTIONS[qIndex - 1], a: text });

    if (qIndex < QUESTIONS.length) {
      updateProgress();
      await askQuestion();
    } else {
      stage = "done";
      updateProgress();
      await finish();
    }
  }
}

async function askQuestion() {
  const q = QUESTIONS[qIndex];
  qIndex++;
  updateProgress();
  await botSay(q);
  setInputEnabled(true);
}

async function finish() {
  await botSay("Спасибо за ответы! Сейчас я немного подумаю и составлю твой мотивационный профиль... ⏳");
  addTyping();

  try {
    const profile = await callGemini();
    removeTyping();
    addBubble("profile", profile.replace(/\n/g, "<br>"));
  } catch (err) {
    removeTyping();
    addBubble("system", "Не удалось получить профиль от ИИ (" + err.message + "). Данные всё равно сохранены.");
    console.error(err);
  }

  await sendToSheet(answers.map(a => a.a).join("\n\n"));
  await delay(400);
  addBubble("system", "✅ Диагностика завершена. Спасибо!");
  counterEl.textContent = "";
}

// ── Gemini API ───────────────────────────────────────────────────────────────

async function callGemini() {
  const qa = answers.map((a, i) =>
    "Вопрос " + (i + 1) + ": " + a.q + "\nОтвет: " + a.a
  ).join("\n\n");

  const body = {
    model: "llama-3.1-8b-instant",
    messages: [
      {
        role: "user",
        content: SYSTEM_PROMPT + "\n\nКласс: " + studentClass +
                 "\n\nВопросы и ответы учащегося:\n\n" + qa
      }
    ]
  };

  const resp = await fetch(OPENROUTER_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + OPENROUTER_KEY
    },
    body: JSON.stringify(body)
  });

  if (!resp.ok) {
    const err = await resp.text();
    throw new Error("OpenRouter " + resp.status + ": " + err);
  }

  const data = await resp.json();
  return data.choices[0].message.content;
}

// ── Google Таблица ───────────────────────────────────────────────────────────

async function sendToSheet(allAnswers) {
  const profile = document.querySelector(".bubble.profile");
  const profileText = profile ? profile.innerText.replace("МОТИВАЦИОННЫЙ ПРОФИЛЬ\n", "") : "";

  const payload = {
    date:    new Date().toLocaleString("ru-RU"),
    class:   studentClass,
    name:    studentName,
    answers: allAnswers,
    profile: profileText
  };

  try {
    await fetch(SCRIPT_URL, {
      method:  "POST",
      mode:    "no-cors",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify(payload)
    });
  } catch (err) {
    console.error("Ошибка отправки в таблицу:", err);
  }
}

// ── Старт ────────────────────────────────────────────────────────────────────
start();
</script>
</body>
</html>
